name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Extract version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Building version: ${VERSION}"

      - name: Build Release APKs
        run: ./gradlew :app:assembleRelease

      - name: Rename APKs
        run: |
          cd app/build/outputs/apk/release
          mv app-arm64-v8a-release.apk "VpnHospot-${{ env.VERSION }}-arm64-v8a.apk"
          mv app-armeabi-v7a-release.apk "VpnHospot-${{ env.VERSION }}-armeabi-v7a.apk"
          mv app-universal-release.apk "VpnHospot-${{ env.VERSION }}-universal.apk"
          ls -lh *.apk

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VpnHospot-APKs
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "VPN Hospot ${{ env.VERSION }}"
          body: |
            ## VPN Hospot ${{ env.VERSION }}

            ### Download APK
            
            | File | Architecture | Description |
            |------|-------------|-------------|
            | `VpnHospot-${{ env.VERSION }}-arm64-v8a.apk` | 64-bit | Modern devices (95% of phones) |
            | `VpnHospot-${{ env.VERSION }}-armeabi-v7a.apk` | 32-bit | Older devices |
            | `VpnHospot-${{ env.VERSION }}-universal.apk` | All | Universal build |

            ### What's New in ${{ env.VERSION }}

            **HTTP Proxy Fixed & Stabilized**
            - Fixed bug where HTTP proxy connections were accepted but not processed (executor worker not running)
            - Changed from ThreadPoolExecutor to direct thread-per-connection for reliable handler execution
            - Added VPN-aware network binding to route traffic through Dark Tunnel/TUN interface
            - HTTP proxy now prioritizes VPN network over cellular for correct routing

            **UI Improvements**
            - Added splash screen with JhopanStore branding
            - Combined Start/Stop into single toggle button
            - Added Info Developer popup with version info
            - Removed unnecessary UI elements for cleaner interface

            **Technical Improvements**
            - Enhanced logging for better debugging
            - Improved network detection and binding logic
            - Better error handling and crash recovery

            ### Installation

            1. Download the APK matching your device architecture
            2. Install the APK on the device that will act as the proxy server
            3. (Optional) Run tunneling apps like Dark Tunnel, HTTP Injector, etc.
            4. Open VPN Hospot and tap Start Proxy
            5. Enable Wi-Fi hotspot or USB tethering from device settings
            6. Connect client device to the hotspot/tethering
            7. Set manual proxy on client device:
               - Hostname: Server IP (shown in VPN Hospot app)
               - Port: 8080 (HTTP) or 1080 (SOCKS5)

            ### Features

            - **HTTP Proxy** - HTTP proxy for browsing and HTTP-compatible apps
            - **SOCKS5 Proxy** - SOCKS5 proxy with TCP + UDP support
            - **Wi-Fi Hotspot** - Share internet connection via hotspot
            - **USB Tethering** - Share internet connection via USB
            - **Traffic Counter** - Real-time download/upload monitoring
            - **VPN-aware Routing** - Automatically route traffic through VPN/TUN interface

            ### Developer

            **JhopanStore**
            - Telegram: https://t.me/jhopan_05
            - Website: https://jhopanstore.my.id

            ---

            **Full Changelog**: https://github.com/jhopan/VpnHospotByJhopanStore/commits/v${{ env.VERSION }}
          draft: false
          prerelease: false
